<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <title>游戏推荐图制作器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app">
        <header class="app-header">
            <h1>游戏推荐图制作器</h1>
        </header>

        <main class="app-main">
            <section class="left-pane">
                <form autocomplete="off" novalidate onsubmit="return false;">
                    <div class="form-group">
                        <label for="steamSearch">Steam 官方信息与截图</label>
                        <div class="steam-search-row">
                            <input id="steamSearchInput" type="text" placeholder="输入 Steam AppID" autocomplete="off"
                                autocorrect="off" autocapitalize="off" spellcheck="false" />
                            <button id="steamSearchBtn" type="button" class="steam-search-btn">获取</button>
                            <div id="steamSearchMessage" class="steam-search-message"></div>
                        </div>
                        <div id="steamSearchResults" class="steamSearchResults"></div>
                    </div>

                    <div class="form-group">
                        <label for="gameName">游戏名称 1</label>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <input id="gameName" type="text" placeholder="中文名" autocomplete="off" autocorrect="off"
                                autocapitalize="off" spellcheck="false" style="flex: 1;" />
                            <input id="gameNameFontSize" class="font-size-input" type="number" min="40" max="100" step="2" value="80" title="标题字号" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="gameName2">游戏名称 2（可选）</label>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <input id="gameName2" type="text" placeholder="英文名" autocomplete="off" autocorrect="off"
                                autocapitalize="off" spellcheck="false" style="flex: 1;" />
                            <input id="gameName2FontSize" class="font-size-input" type="number" min="28" max="72" step="2" value="48" title="副标题字号" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="gameTags">游戏标签（可多条，用空格或 / 分隔）</label>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <input id="gameTags" type="text" placeholder="例如：动作 / 冒险 / 单机" autocomplete="off"
                                autocorrect="off" autocapitalize="off" spellcheck="false" style="flex: 1;" />
                            <input id="gameTagsFontSize" class="font-size-input" type="number" min="28" max="60" step="2" value="40" title="标签字号" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>图片来源</label>
                        <div class="source-switch">
                            <button type="button" id="sourceSteamBtn" class="source-switch-btn active">官方图片</button>
                            <button type="button" id="sourceLocalBtn" class="source-switch-btn">本地图片</button>
                        </div>
                    </div>

                    <div id="steamSourceGroup">


                        <div class="form-group">
                            <label>从 Steam 截图中选择两张图片</label>
                            <div class="steam-screenshots-wrapper">
                                <div id="steamScreenshots" class="steam-screenshots"></div>
                                <div class="steam-screenshots-scrollbar">
                                    <div class="steam-screenshots-thumb"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="localSourceGroup" style="display: none;">
                        <div class="local-images-row">
                            <div class="local-image-column">
                                <div class="form-group">
                                    <label>本地图片 1（上方）</label>
                                    <input id="image1" type="file" accept="image/*" autocomplete="off" style="display: none;" />
                                    <button type="button" class="file-select-btn" data-target="image1">选择图片 1</button>
                                    <div class="local-image-preview">
                                        <img id="image1Preview" alt="预览图 1" />
                                    </div>
                                </div>
                            </div>

                            <div class="local-image-column">
                                <div class="form-group">
                                    <label>本地图片 2（下方）</label>
                                    <input id="image2" type="file" accept="image/*" autocomplete="off" style="display: none;" />
                                    <button type="button" class="file-select-btn" data-target="image2">选择图片 2</button>
                                    <div class="local-image-preview">
                                        <img id="image2Preview" alt="预览图 2" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </form>
            </section>

            <section class="center-pane">
                <h2 class="preview-title">预览</h2>
                <div class="preview-area">
                    <canvas id="previewCanvas"></canvas>
                    <div id="placeholder" class="placeholder"></div>
                </div>

                <div class="center-actions">
                    <button id="generateBtn" type="button">生成推荐图</button>
                    <button id="downloadBtn" type="button" disabled>下载当前图片</button>
                    <button id="addToFolderBtn" type="button" disabled>加入文件夹</button>
                </div>
            </section>

            <section class="right-pane">
                <form autocomplete="off" novalidate onsubmit="return false;">
                    <div class="form-group">
                        <label for="watermarkText">水印文本</label>
                        <input id="watermarkText" type="text" placeholder="例如：@ZTMYO" autocomplete="off"
                            autocorrect="off" autocapitalize="off" spellcheck="false" />
                    </div>

                    <div class="form-group">
                        <label>价格文本</label>
                        <div style="display: flex; gap: 8px;">
                            <input id="metaPriceOriginal" type="text" placeholder="原价" autocomplete="off"
                                autocorrect="off" autocapitalize="off" spellcheck="false" style="flex: 1;" />
                            <input id="metaPriceCurrent" type="text" placeholder="现价" autocomplete="off"
                                autocorrect="off" autocapitalize="off" spellcheck="false" style="flex: 1;" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="metaRating">评分文本</label>
                        <input id="metaRating" type="text" placeholder="例如：评分 90、好评如潮" autocomplete="off"
                            autocorrect="off" autocapitalize="off" spellcheck="false" />
                    </div>
                </form>
            </section>
        </main>
    </div>

    <!-- 下载格式选择模态框 -->
    <div id="downloadFormatModal" class="modal-backdrop" style="display: none;">
        <div class="modal-dialog">
            <button type="button" id="downloadCloseBtn" class="modal-close" aria-label="关闭">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4L12 12M12 4L4 12" stroke-width="1.5" stroke-linecap="round" />
                </svg>
            </button>
            <div class="modal-title">选择下载格式</div>

            <div class="modal-body">
                <label class="modal-option">
                    <input type="radio" name="downloadFormat" value="png" checked />
                    <span>PNG（无损，清晰）</span>
                </label>
                <label class="modal-option">
                    <input type="radio" name="downloadFormat" value="jpg" />
                    <span>JPG（有损，体积更小）</span>
                </label>
                <label class="modal-option">
                    <input type="radio" name="downloadFormat" value="webp" />
                    <span>WEBP（更高压缩率，现代浏览器支持）</span>
                </label>
            </div>

            <div class="modal-actions">
                <button type="button" id="downloadConfirmBtn" class="modal-btn primary">确认下载</button>
            </div>
        </div>
    </div>

    <!-- 图片文件夹管理模态框 -->
    <div id="imageFolderModal" class="modal-backdrop" style="display: none;">
        <div class="modal-dialog">
            <button type="button" id="imageFolderCloseBtn" class="modal-close" aria-label="关闭">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4L12 12M12 4L4 12" stroke-width="1.5" stroke-linecap="round" />
                </svg>
            </button>
            <div class="modal-title">图片文件夹</div>

            <div class="modal-body" id="imageFolderList" style="max-height: 400px; overflow: auto;"></div>
            <div class="modal-actions">
                <button type="button" id="imageFolderExportBtn" class="modal-btn primary">导出 ZIP</button>
            </div>
        </div>
    </div>

    <!-- 全局 Toast 容器 -->
    <div id="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <!-- 右下角固定文件夹按钮 -->
    <button id="folderFloatingBtn" class="folder-fab" type="button" aria-label="打开图片文件夹">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.75 7.5C3.75 6.25736 4.75736 5.25 6 5.25H10.0607C10.5765 5.25 11.0712 5.45433 11.4142 5.80711L12.5858 7.01789C12.9288 7.37067 13.4235 7.575 13.9393 7.575H18C19.2426 7.575 20.25 8.58236 20.25 9.825V16.5C20.25 17.7426 19.2426 18.75 18 18.75H6C4.75736 18.75 3.75 17.7426 3.75 16.5V7.5Z" stroke="#111827" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 10.5H20" stroke="#111827" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
